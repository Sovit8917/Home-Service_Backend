name: CI/CD — Home Service Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: home_service_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/home_service_test

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/home_service_test

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/home_service_test
          JWT_SECRET: test-jwt-secret-for-ci-only
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder
          TWILIO_ACCOUNT_SID: ACplaceholder
          TWILIO_AUTH_TOKEN: placeholder
          TWILIO_PHONE_NUMBER: '+10000000000'
          AWS_ACCESS_KEY_ID: placeholder
          AWS_SECRET_ACCESS_KEY: placeholder
          AWS_S3_BUCKET: placeholder
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          echo "Deploying to Railway..."
          # npx @railway/cli deploy --service home-service-backend
          # Or use your deployment method (Render, EC2, etc.)
